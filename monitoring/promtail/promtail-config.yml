server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ── Conteneurs Docker — labels automatiques ───────────────────────────────
  - job_name: docker_containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["service"]   # Ne scrape que les conteneurs avec le label "service"

    relabel_configs:
      # Nom du service depuis le label Docker
      - source_labels: [__meta_docker_container_label_service]
        target_label: service

      # Environnement depuis le label Docker
      - source_labels: [__meta_docker_container_label_env]
        target_label: env

      # Nom du conteneur
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container

      # Supprimer les conteneurs sans label service
      - source_labels: [service]
        regex: ".+"
        action: keep

    pipeline_stages:
      # Parsing JSON structuré (logs FastAPI)
      - json:
          expressions:
            level: level
            msg: message
            timestamp: timestamp
            request_id: request_id
            cabinet_id: cabinet_id
            duration_ms: duration_ms

      # Extraire le niveau de log pour le label Loki
      - labels:
          level:
          request_id:

      # Supprimer les champs sensibles avant stockage
      # (patient_id, doctor_id ne doivent jamais être en clair dans les logs)
      - replace:
          expression: '"(patient_id|ins|nom_patient)":\s*"[^"]*"'
          replace: '"$1":"[REDACTED]"'

      # Timestamp depuis le champ JSON
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  # ── Logs système du serveur ───────────────────────────────────────────────
  - job_name: system_logs
    static_configs:
      - targets: ["localhost"]
        labels:
          job: system
          env: production
          __path__: /var/log/syslog

    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\S+ \S+) (?P<host>\S+) (?P<process>\S+): (?P<message>.*)'
      - labels:
          host:
          process:
